<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Career Journey</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>

body{
  margin:0;
  font-family:monospace;
  background:#87CEEB;
  overflow-x:hidden;
}

/* world */

.world{
  height:500vh;
  position:relative;
  background:linear-gradient(#87CEEB 0%, #87CEEB 30%, #6cc46c 30%);
}

/* footpath */

.path{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:100%;
  background:#c2a47b;
}

/* character */

.character{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  width:80px;
  height:80px;
  background:url("https://i.imgur.com/4LGAZ8t.png");
  background-size:cover;
}

/* levels */

.level{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.banner{
  background:white;
  padding:20px 35px;
  border-radius:10px;
  font-size:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  opacity:0;
  transform:translateY(40px);
}

</style>
</head>

<body>

<div class="world">

<div class="path"></div>
<div class="character" id="player"></div>

<section class="level">
<div class="banner">🎓 Education – BCA → MCA</div>
</section>

<section class="level">
<div class="banner">💼 NSEIT – IT Supervisor</div>
</section>

<section class="level">
<div class="banner">🚀 Airtory – Software Engineer</div>
</section>

<section class="level">
<div class="banner">⚡ Future Goal – Full Stack + DevOps</div>
</section>

</div>

<script>

gsap.registerPlugin(ScrollTrigger);

/* move character */

gsap.to("#player",{
  y:-1800,
  ease:"none",
  scrollTrigger:{
    trigger:".world",
    start:"top top",
    end:"bottom bottom",
    scrub:true
  }
});

/* banner animation */

gsap.utils.toArray(".banner").forEach((banner)=>{

  gsap.to(banner,{
    opacity:1,
    y:0,
    duration:1,
    scrollTrigger:{
      trigger:banner,
      start:"top 80%"
    }
  });

});

</script>

</body>
</html>
